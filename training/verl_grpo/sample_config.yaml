# InfraGraph AI — vERL GRPO training configuration
# Qwen3-4B-Instruct + LoRA + GRPO for RCA remediation alignment
#
# This file documents the intended configuration.  Adapt paths and
# hardware settings to your environment before running.

data:
  tokenizer:        Qwen/Qwen3-4B-Instruct
  train_files:      ./training/verl_grpo/data/rca_remediation_rl_train.jsonl
  val_files:        ./training/verl_grpo/data/rca_remediation_rl_eval.jsonl
  prompt_key:       prompt
  max_prompt_length: 2048
  max_response_length: 1024

actor_rollout_ref:
  model:
    path:            Qwen/Qwen3-4B-Instruct
    use_lora:        true
  actor:
    strategy:        fsdp           # use deepspeed for multi-GPU
    lora_rank:       16
    lora_alpha:      32
    lora_dropout:    0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    optim:           adamw_torch
    lr:              1.0e-5
    grad_clip:       1.0
    ppo_mini_batch_size: 2
    ppo_micro_batch_size: 1
  rollout:
    name:            vllm
    temperature:     0.7
    top_p:           0.9
    top_k:           50
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.5
  ref:
    fsdp_config:
      param_offload: false

critic:
  strategy:          fsdp
  optim:             adamw_torch
  lr:                1.0e-5
  model:
    path:            Qwen/Qwen3-4B-Instruct

reward_model:
  # Uses custom reward functions from training/verl_grpo/reward_functions.py
  # Register batch_reward_fn as the reward_fn in the vERL trainer config.
  enable: false

algorithm:
  gamma:              1.0
  lam:                0.95
  adv_estimator:      grpo
  kl_penalty:         kl
  kl_ctrl:
    type:             fixed
    kl_coef:          0.001
  grpo_group_size:    4

trainer:
  total_epochs:       1
  project_name:       infragraph_ai
  experiment_name:    qwen3_grpo_rca_remediation
  logger:             [ console, wandb ]
  default_local_dir:  ./training/verl_grpo/runs
  save_freq:          50
  test_freq:          50
  val_before_train:   true

# AMD GPU (ROCm) notes:
#   - Install torch with ROCm wheel: pip install torch --index-url https://download.pytorch.org/whl/rocm6.0
#   - Set HSA_OVERRIDE_GFX_VERSION if needed for your GPU generation
#   - FSDP is preferred over DeepSpeed for ROCm stability
