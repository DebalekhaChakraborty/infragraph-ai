# InfraGraph AI — YOLOv8 training configuration
model: yolov8m.pt          # base weights (nano/small/medium/large/xlarge)
data:  configs/dataset_config.yaml

epochs:      100
imgsz:       1400
batch:       8
patience:    20            # early stopping
optimizer:   AdamW
lr0:         0.001
lrf:         0.01          # final lr = lr0 * lrf
momentum:    0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8

# Augmentation
hsv_h: 0.015
hsv_s: 0.3
hsv_v: 0.3
degrees: 5.0
translate: 0.1
scale: 0.4
fliplr: 0.5
mosaic: 0.5
mixup: 0.1

# Output
project: outputs
name:    infragraph_run
exist_ok: true
save_period: 10            # save checkpoint every N epochs
