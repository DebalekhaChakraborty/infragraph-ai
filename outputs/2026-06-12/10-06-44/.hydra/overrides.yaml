- trainer.n_gpus_per_node=1
- trainer.total_epochs=1
- trainer.logger=[console]
- trainer.save_freq=8
- trainer.test_freq=8
- trainer.default_local_dir=training/verl_grpo/runs/qwen3_4b_grpo_lora_amd_saved
