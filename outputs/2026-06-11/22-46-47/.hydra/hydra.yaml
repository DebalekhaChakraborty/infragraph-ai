hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - data.train_files=training/verl_grpo/data/verl_train.parquet
    - data.val_files=training/verl_grpo/data/verl_eval.parquet
    - custom_reward_function.path=training/verl_grpo/verl_reward.py
    - custom_reward_function.name=compute_score
    - actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct
    - actor_rollout_ref.model.lora_rank=16
    - actor_rollout_ref.model.lora_alpha=32
    - actor_rollout_ref.model.target_modules=all-linear
    - actor_rollout_ref.model.use_shm=False
    - actor_rollout_ref.actor.strategy=fsdp
    - actor_rollout_ref.actor.optim.lr=3e-5
    - actor_rollout_ref.actor.ppo_mini_batch_size=1
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1
    - actor_rollout_ref.actor.use_kl_loss=True
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.n=2
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.35
    - actor_rollout_ref.rollout.max_model_len=1024
    - actor_rollout_ref.rollout.max_num_batched_tokens=1024
    - actor_rollout_ref.rollout.load_format=safetensors
    - trainer.total_epochs=1
    - trainer.logger=[console]
    - trainer.default_local_dir=training/verl_grpo/runs/qwen3_4b_grpo_lora_amd
  job:
    name: main_ppo
    chdir: null
    override_dirname: actor_rollout_ref.actor.kl_loss_coef=0.001,actor_rollout_ref.actor.optim.lr=3e-5,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1,actor_rollout_ref.actor.ppo_mini_batch_size=1,actor_rollout_ref.actor.strategy=fsdp,actor_rollout_ref.actor.use_kl_loss=True,actor_rollout_ref.model.lora_alpha=32,actor_rollout_ref.model.lora_rank=16,actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct,actor_rollout_ref.model.target_modules=all-linear,actor_rollout_ref.model.use_shm=False,actor_rollout_ref.rollout.gpu_memory_utilization=0.35,actor_rollout_ref.rollout.load_format=safetensors,actor_rollout_ref.rollout.max_model_len=1024,actor_rollout_ref.rollout.max_num_batched_tokens=1024,actor_rollout_ref.rollout.n=2,actor_rollout_ref.rollout.name=vllm,algorithm.adv_estimator=grpo,custom_reward_function.name=compute_score,custom_reward_function.path=training/verl_grpo/verl_reward.py,data.train_files=training/verl_grpo/data/verl_train.parquet,data.val_files=training/verl_grpo/data/verl_eval.parquet,trainer.default_local_dir=training/verl_grpo/runs/qwen3_4b_grpo_lora_amd,trainer.logger=[console],trainer.total_epochs=1
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.3
    version_base: '1.3'
    cwd: /workspace/shared/infragraph-ai
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /usr/local/lib/python3.12/dist-packages/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/shared/infragraph-ai/outputs/2026-06-11/22-46-47
    choices:
      distillation: distillation
      algorithm@algorithm.rollout_correction: rollout_correction
      reward: reward
      model@critic.model: hf_model
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      data: legacy_data
      model_engine: dp
      critic: dp_critic
      critic/../engine@critic.fsdp: fsdp
      critic/../optim@critic.optim: fsdp
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
