- algorithm.adv_estimator=grpo
- data.train_files=training/verl_grpo/data/verl_train.parquet
- data.val_files=training/verl_grpo/data/verl_eval.parquet
- custom_reward_function.path=training/verl_grpo/verl_reward.py
- custom_reward_function.name=compute_score
- actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct
- actor_rollout_ref.model.lora_rank=16
- actor_rollout_ref.model.lora_alpha=32
- actor_rollout_ref.model.target_modules=all-linear
- actor_rollout_ref.model.use_shm=False
- actor_rollout_ref.actor.strategy=fsdp
- actor_rollout_ref.actor.optim.lr=3e-5
- actor_rollout_ref.actor.ppo_mini_batch_size=1
- actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1
- actor_rollout_ref.actor.use_kl_loss=True
- actor_rollout_ref.actor.kl_loss_coef=0.001
- actor_rollout_ref.rollout.name=vllm
- actor_rollout_ref.rollout.n=2
- actor_rollout_ref.rollout.gpu_memory_utilization=0.35
- actor_rollout_ref.rollout.max_model_len=1024
- actor_rollout_ref.rollout.max_num_batched_tokens=1024
- actor_rollout_ref.rollout.load_format=safetensors
- trainer.total_epochs=1
- trainer.logger=[console]
- trainer.default_local_dir=training/verl_grpo/runs/qwen3_4b_grpo_lora_amd
